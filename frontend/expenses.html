<!DOCTYPE html>
<html>
<head>
    <title>Expenses</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/app.js"></script>
</head>

<body onload="checkAuth(); load();">

<div class="mesh-bg"></div>

<div class="layout">

<div class="sidebar">
<h2>💸 FinanceAI</h2>
<ul>
<li onclick="window.location.href='/dashboard'">🏠 Dashboard</li>

<li onclick="window.location.href='/ai.html'">🤖 AI</li>

</ul>

<h1>Add Expense</h1>

<input type="date" id="date">

<table>
<thead>
<tr>
<th>Date</th>
<th>Category</th>
<th>Amount</th>

</tr>
</thead>

<tbody id="list"></tbody>

</table>

</div>
</div>
